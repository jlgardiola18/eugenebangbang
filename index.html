<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mini GTA Style Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
        }
        
        canvas {
            display: block;
            background: #2c3e50;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div id="ui">
        WASD / Arrow Keys = Move | CLICK = Shoot<br> Score: <span id="score">0</span> | Health: <span id="hp">100</span>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const scoreEl = document.getElementById('score');
        const hpEl = document.getElementById('hp');

        // PLAYER SPRITE
        const playerImg = new Image();
        playerImg.src = "player.png";

        const zombieImg = new Image();
        zombieImg.src = "zombie.png"; // use your local zombie file // simple zombie sprite

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            w: 120, // increased size
            h: 160, // increased size
            speed: 4,
            hp: 100
        };

        let score = 0;
        const keys = {};

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // ZOMBIES (spawn from right side)
        const enemies = [];

        function spawnEnemy() {
            enemies.push({
                x: canvas.width + 50,
                y: Math.random() * canvas.height,
                size: 100, // larger zombie size
                speed: 1 + Math.random() * 1.5
            });
        }
        setInterval(spawnEnemy, 1500);

        // BULLETS (towards mouse)
        const bullets = [];

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const startX = player.x + player.w / 2;
            const startY = player.y + player.h / 2;

            let dx = mouseX - startX;
            let dy = mouseY - startY;

            let dist = Math.hypot(dx, dy);
            if (dist === 0) dist = 1; // prevent bug

            bullets.push({
                x: startX,
                y: startY,
                dx: (dx / dist) * 8,
                dy: (dy / dist) * 8
            });
        });


        function update() {
            // movement
            if (keys['arrowright'] || keys['d']) player.x += player.speed;
            if (keys['arrowleft'] || keys['a']) player.x -= player.speed;
            if (keys['arrowup'] || keys['w']) player.y -= player.speed;
            if (keys['arrowdown'] || keys['s']) player.y += player.speed;

            player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

            // zombies move toward player
            enemies.forEach((e, i) => {
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.hypot(dx, dy);
                e.x += dx / dist * e.speed;
                e.y += dy / dist * e.speed;

                if (dist < 50) {
                    player.hp -= 0.3;
                    if (player.hp <= 0) {
                        alert('Game Over! Score: ' + score);
                        location.reload();
                    }
                }
            });

            // bullets
            bullets.forEach((b, bi) => {
                b.x += b.dx;
                b.y += b.dy;

                enemies.forEach((e, ei) => {
                    if (
                        b.x < e.x + e.size &&
                        b.x > e.x &&
                        b.y < e.y + e.size &&
                        b.y > e.y
                    ) {
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score++;
                        scoreEl.textContent = score;
                    }
                });
            });

            hpEl.textContent = Math.floor(player.hp);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // player
            ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

            // zombies
            enemies.forEach(e => {
                ctx.drawImage(zombieImg, e.x, e.y, e.size, e.size);
            });

            // bullets
            ctx.fillStyle = 'yellow';
            bullets.forEach(b => {
                ctx.fillRect(b.x, b.y, 5, 5);
            });
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        playerImg.onload = () => loop();
    </script>

</body>

</html>
